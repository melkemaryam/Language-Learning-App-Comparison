<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Archive of Language Learning Apps</title>
  <style>
    body{font-family:Georgia,serif;background:#f7f7f5;max-width:1400px;margin:auto;padding:25px}
    .panel{background:white;border:1px solid #ddd;border-radius:10px;padding:20px;margin-bottom:20px}
    table{width:100%;border-collapse:collapse}
    th,td{border:1px solid #ddd;padding:8px;vertical-align:top}
    th{background:#f0f0f0}
    button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer}
    .primary{background:#1f4e79;color:white}
    .secondary{background:#e9ecef}
    input,textarea{width:100%;padding:6px;box-sizing:border-box}
    textarea{min-width:0;max-width:100%;overflow-wrap:break-word;resize:vertical}
    .topnav{
      background:#1f4e79;
      padding:12px 18px;
      margin-bottom:20px;
      border-radius:10px;
    }
    .topnav a{
      color:white;
      text-decoration:none;
      margin-right:18px;
      font-weight:bold;
    }
    .topnav a:hover{text-decoration:underline}
    #appsTable a{color:#1f4e79;text-decoration:none}
    #appsTable a:hover{text-decoration:underline}
    #appsTable button{padding:6px 10px;margin-right:4px;font-size:13px}
    .modal-overlay{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.5);
      z-index:9999;
    }
    .modal-overlay.show{
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .modal-box{
      background:white;
      padding:20px;
      border-radius:10px;
      max-width:500px;
      width:100%;
      position:relative;
    }
    .modal-close{
      position:absolute;
      top:10px;
      right:15px;
      font-size:20px;
      cursor:pointer;
      color:#666;
    }
    .modal-box label{
      display:block;
      margin-top:12px;
      font-weight:bold;
    }
    .modal-box .form-row{
      display:flex;
      gap:10px;
      margin-top:12px;
    }
    .modal-box .form-row button{flex:1}
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<nav class="topnav">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="archive.html">Archive</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="panel">
  <h1>Archive of Language Learning Apps</h1>
  <p>This shows all the current Language Learning Apps that focus on underserved languages.</p>
</div>

<div class="panel">
  <h2>Language Learning Apps Archive</h2>
  <table id="appsTable">
    <thead>
      <tr>
        <th>App</th>
        <th>Languages</th>
        <th>Reference</th>
        <th>Notes</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<button class="primary" id="openAddLangBtn">Add New App</button>
<button class="secondary" id="downloadCSVBtn">Download CSV</button>
<button class="secondary" id="downloadJSONBtn">Download JSON</button>

<div class="modal-overlay" id="addLangModal">
  <div class="modal-box">
    <span class="modal-close" id="closeAddLangBtn">&times;</span>
    <h2>Add New Language App</h2>

    <label for="appInput">App</label>
    <input id="appInput" type="text" placeholder="e.g. Duolingo">

    <label for="langInput">Languages</label>
    <textarea id="langInput" rows="2" placeholder="e.g. Spanish, French, German"></textarea>

    <label for="refLinkInput">Reference Link</label>
    <input id="refLinkInput" type="url" placeholder="https://example.com/paper">

    <label for="notesInput">Notes</label>
    <textarea id="notesInput" rows="3" placeholder="Any notes about this app or study"></textarea>

    <div class="form-row">
      <button class="secondary" id="cancelAddLangBtn">Cancel</button>
      <button class="primary" id="submitAddLangBtn">Add</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBun5d_4VVkcGS69jDqIm28k4Ah4aJ7Ja0",
  authDomain: "language-learning-app-archive.firebaseapp.com",
  databaseURL: "https://language-learning-app-archive-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "language-learning-app-archive",
  storageBucket: "language-learning-app-archive.firebasestorage.app",
  messagingSenderId: "934444112237",
  appId: "1:934444112237:web:d09b8f2bc071a2d38ca264",
  measurementId: "G-1P7G4Z4X2D"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let languageApps = [];
const modal = document.getElementById("addLangModal");
const submitAddLangBtn = document.getElementById("submitAddLangBtn");

function loadAppsFromFirebase() {
  db.ref("languageApps").on("value", snapshot => {
    languageApps = [];
    snapshot.forEach(child => {
      languageApps.push({ _key: child.key, ...child.val() });
    });
    renderAppsTable();
  });
}

function addAppToFirebase(appData) {
  return db.ref("languageApps").push(appData);
}

function deleteAppFromFirebase(index) {
  return db.ref(`languageApps/${languageApps[index]._key}`).remove();
}

function editAppInFirebase(index, updatedData) {
  return db.ref(`languageApps/${languageApps[index]._key}`).set(updatedData);
}

function renderAppsTable() {
  const tbody = document.querySelector("#appsTable tbody");
  tbody.innerHTML = "";

  languageApps.forEach((item, index) => {
    tbody.innerHTML += `
      <tr>
        <td>${item.app || ""}</td>
        <td>${item.languages || ""}</td>
        <td><a href="${item.ref || "#"}" target="_blank" rel="noopener noreferrer">${item.refTitle || "Where to find it"}</a></td>
        <td>${item.notes || ""}</td>
        <td>
          <button class="secondary edit-btn" data-index="${index}">Edit</button>
          <button class="secondary delete-btn" data-index="${index}">Delete</button>
        </td>
      </tr>
    `;
  });

  document.querySelectorAll(".edit-btn").forEach(btn => {
    btn.addEventListener("click", () => editApp(Number(btn.dataset.index)));
  });

  document.querySelectorAll(".delete-btn").forEach(btn => {
    btn.addEventListener("click", () => deleteApp(Number(btn.dataset.index)));
  });
}

function openModal() {
  modal.classList.add("show");
}

function closeModal() {
  modal.classList.remove("show");
  document.getElementById("appInput").value = "";
  document.getElementById("langInput").value = "";
  document.getElementById("refLinkInput").value = "";
  document.getElementById("notesInput").value = "";
  submitAddLangBtn.textContent = "Add";
}

function addCurrentApp() {
  const app = document.getElementById("appInput").value.trim();
  const languages = document.getElementById("langInput").value.trim();
  const ref = document.getElementById("refLinkInput").value.trim();
  const notes = document.getElementById("notesInput").value.trim();

  if (!app || !ref) return alert("Please fill in App and Reference Link.");

  addAppToFirebase({ app, languages, ref, notes }).then(closeModal);
}

let editingIndex = null;

submitAddLangBtn.addEventListener("click", async () => {
  const app = document.getElementById("appInput").value.trim();
  const languages = document.getElementById("langInput").value.trim();
  const ref = document.getElementById("refLinkInput").value.trim();
  const notes = document.getElementById("notesInput").value.trim();

  if (!app || !ref) return alert("Please fill in App and Reference Link.");

  const data = { app, languages, ref, notes };

  if (editingIndex === null) {
    await addAppToFirebase(data);
  } else {
    await editAppInFirebase(editingIndex, data);
  }

  editingIndex = null;
  submitAddLangBtn.textContent = "Add";
  closeModal();
});


function editApp(index) {
  editingIndex = index;
  const item = languageApps[index];

  document.getElementById("appInput").value = item.app || "";
  document.getElementById("langInput").value = item.languages || "";
  document.getElementById("refLinkInput").value = item.ref || "";
  document.getElementById("notesInput").value = item.notes || "";

  submitAddLangBtn.textContent = "Save";
  openModal();
}

function deleteApp(index) {
  if (confirm(`Delete "${languageApps[index].app}"?`)) {
    deleteAppFromFirebase(index);
  }
}

document.getElementById("openAddLangBtn").addEventListener("click", openModal);
document.getElementById("closeAddLangBtn").addEventListener("click", closeModal);
document.getElementById("cancelAddLangBtn").addEventListener("click", closeModal);

modal.addEventListener("click", function(event) {
  if (event.target === modal) closeModal();
});

document.getElementById("downloadCSVBtn").addEventListener("click", () => {
  if (languageApps.length === 0) return alert("Database is empty");
  const headers = ["app", "languages", "ref", "notes"];
  const rows = [headers.join(",")];
  languageApps.forEach(item => {
    rows.push(headers.map(h => '"' + String(item[h] ?? "").replace(/"/g, '""') + '"').join(","));
  });
  const blob = new Blob([rows.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "language_apps.csv";
  a.click();
});

document.getElementById("downloadJSONBtn").addEventListener("click", () => {
  if (languageApps.length === 0) return alert("Database is empty");
  const blob = new Blob([JSON.stringify(languageApps, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "language_apps.json";
  a.click();
});

loadAppsFromFirebase();
closeModal();
</script>

</body>
</html>
