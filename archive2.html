<body>

<nav class="topnav">
  <a href="index.html">Home</a>

<div class="panel">
  <h1>Archive of Language Learning Apps</h1>
  <p>This shows all the current Language Learning Apps that focus on underserved languages.</p>
</div>

<div class="panel">
  <h2>Language Learning Apps Archive</h2>
  <table id="appsTable">
    <thead>
      <tr>
        <th>App</th>
        <th>Languages</th>
        <th>Reference</th>
        <th>Notes</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<button class="primary" id="openAddLangBtn">Add New Language</button>
<button class="secondary" id="downloadCSVBtn">Download CSV</button>
<button class="secondary" id="downloadJSONBtn">Download JSON</button>

<div class="modal-overlay" id="addLangModal">
  <div class="modal-box">
    <span class="modal-close" id="closeAddLangBtn">&times;</span>
    <h2>Add New Language App</h2>

    <label for="appInput">App</label>
    <input id="appInput" type="text" placeholder="e.g. Duolingo">

    <label for="langInput">Languages</label>
    <textarea id="langInput" rows="2" placeholder="e.g. Spanish, French, German"></textarea>

    <label for="refLinkInput">Reference Link</label>
    <input id="refLinkInput" type="url" placeholder="https://example.com/paper">

    <label for="notesInput">Notes</label>
    <textarea id="notesInput" rows="3" placeholder="Any notes about this app or study"></textarea>

    <div class="form-row">
      <button class="secondary" id="cancelAddLangBtn">Cancel</button>
      <button class="primary" id="submitAddLangBtn">Add</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyBun5d_4VVkcGS69jDqIm28k4Ah4aJ7Ja0",
    authDomain: "language-learning-app-archive.firebaseapp.com",
    databaseURL: "https://language-learning-app-archive-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "language-learning-app-archive",
    storageBucket: "language-learning-app-archive.firebasestorage.app",
    messagingSenderId: "934444112237",
    appId: "1:934444112237:web:d09b8f2bc071a2d38ca264",
    measurementId: "G-1P7G4Z4X2D"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
</script>
<script>

let languageApps = [];

function renderAppsTable() {
  const tbody = document.querySelector("#appsTable tbody");
  tbody.innerHTML = "";

  languageApps.forEach((item, index) => {
    tbody.innerHTML += `
      <tr>
        <td>${item.app}</td>
        <td>${item.languages}</td>
        <td><a href="${item.ref}" target="_blank" rel="noopener noreferrer">Where to find it</a></td>
        <td>${item.notes || ""}</td>
        <td>
          <button class="secondary" onclick="editApp(${index})">Edit</button>
          <button class="secondary" onclick="deleteApp(${index})">Delete</button>
        </td>
      </tr>
    `;
  });
}

function loadAppsFromFirebase() {
  db.ref("languageApps").on("value", snapshot => {
    languageApps = [];
    snapshot.forEach(child => {
      languageApps.push({
        _key: child.key,
        ...child.val()
      });
    });
    renderAppsTable();
  });
}

function addAppToFirebase(appData) {
  return db.ref("languageApps").push(appData);
}

function deleteAppFromFirebase(index) {
  return db.ref(`languageApps/${languageApps[index]._key}`).remove();
}

function editAppInFirebase(index, updatedData) {
  return db.ref(`languageApps/${languageApps[index]._key}`).set(updatedData);
}

submitAddLangBtn.addEventListener("click", async () => {
  const app = document.getElementById("appInput").value.trim();
  const languages = document.getElementById("langInput").value.trim();
  const ref = document.getElementById("refLinkInput").value.trim();
  const notes = document.getElementById("notesInput").value.trim();

  if (!app || !ref) return alert("Please fill in App and Reference Link.");

  await addAppToFirebase({ app, languages, ref, notes });
  closeModal();
});


renderAppsTable();

const openAddLangBtn = document.getElementById("openAddLangBtn");
const closeAddLangBtn = document.getElementById("closeAddLangBtn");
const cancelAddLangBtn = document.getElementById("cancelAddLangBtn");
const submitAddLangBtn = document.getElementById("submitAddLangBtn");
const modal = document.getElementById("addLangModal");

function openModal() {
  modal.classList.add("show");
}

// Load apps from Firebase
function loadAppsFromFirebase() {
  db.ref("languageApps").on("value", (snapshot) => {
    languageApps = [];
    snapshot.forEach((childSnapshot) => {
      const appData = childSnapshot.val();
      appData._key = childSnapshot.key; // store key for deletes
      languageApps.push(appData);
    });
    renderAppsTable();
  });
}

// Add app
function addAppToFirebase(appData) {
  db.ref("languageApps").push(appData);
}

// Delete app
function deleteAppFromFirebase(index) {
  const key = languageApps[index]._key;
  db.ref(`languageApps/${key}`).remove();
}

// Edit app
function editAppInFirebase(index, updatedData) {
  const key = languageApps[index]._key;
  db.ref(`languageApps/${key}`).update(updatedData);
}

// On page load
loadAppsFromFirebase();

submitAddLangBtn.addEventListener("click", () => {
  const app = document.getElementById("appInput").value.trim();
  const languages = document.getElementById("langInput").value.trim();
  const refLink = document.getElementById("refLinkInput").value.trim();
  const notes = document.getElementById("notesInput").value.trim();


  const appData = {
    app,
    languages,
    ref: refLink,
    notes
  };

  addAppToFirebase(appData); // instead of languageApps.push()
  closeModal();
});

function deleteApp(index) {
  if (confirm(`Delete "${languageApps[index].app}"?`)) {
    deleteAppFromFirebase(index); // instead of languageApps.splice()
  }
}

function editApp(index) {
  const item = languageApps[index];

  document.getElementById("appInput").value = item.app;
  document.getElementById("langInput").value = item.languages || "";
  document.getElementById("refLinkInput").value = item.ref;
  document.getElementById("notesInput").value = item.notes || "";

  submitAddLangBtn.textContent = "Save";
  submitAddLangBtn.onclick = () => {
    const app = document.getElementById("appInput").value.trim();
    const languages = document.getElementById("langInput").value.trim();
    const refLink = document.getElementById("refLinkInput").value.trim();
    const notes = document.getElementById("notesInput").value.trim();

    if (!app || !refLink) {
      alert("Please fill in App and Reference Link.");
      return;
    }

    const updatedData = {
      ...item,
      app,
      languages,
      ref: refLink,
      notes
    };

    editAppInFirebase(index, updatedData); // instead of direct assignment
    closeModal();

    submitAddLangBtn.textContent = "Add";
    submitAddLangBtn.onclick = () => {
      const appNew = document.getElementById("appInput").value.trim();
      const languagesNew = document.getElementById("langInput").value.trim();
      const refLinkNew = document.getElementById("refLinkInput").value.trim();
      const notesNew = document.getElementById("notesInput").value.trim();

      if (!appNew || !refLinkNew) {
        alert("Please fill in App and Reference Link.");
        return;
      }

      const appData = {
        app: appNew,
        languages: languagesNew,
        ref: refLinkNew,
        notes: notesNew
      };

      addAppToFirebase(appData);
      renderAppsTable();
      closeModal();
    };
  };

  openModal();
}

function closeModal() {
  modal.classList.remove("show");
  // Optionally clear form
  document.getElementById("appInput").value = "";
  document.getElementById("langInput").value = "";
  document.getElementById("refLinkInput").value = "";
  document.getElementById("notesInput").value = "";
}

openAddLangBtn.addEventListener("click", openModal);
closeAddLangBtn.addEventListener("click", closeModal);
cancelAddLangBtn.addEventListener("click", closeModal);

// Close when clicking outside the modal box
modal.addEventListener("click", function (event) {
  if (event.target === modal) {
    closeModal();
  }
});

submitAddLangBtn.addEventListener("click", () => {
  const app = document.getElementById("appInput").value.trim();
  const languages = document.getElementById("langInput").value.trim();
  const refLink = document.getElementById("refLinkInput").value.trim();
  //const refTitle = document.getElementById("refTitleInput").value.trim();
  const notes = document.getElementById("notesInput").value.trim();

  if (!app || !refLink) {
    alert("Please fill in App and Reference Link.");
    return;
  }

  // You can add studyType from a dropdown if you want; here we default to "General Review"
  const studyType = "General Review";

  languageApps.push({
    app,
    studyType,
    ref: refLink,
    languages,
    notes
  });

  renderAppsTable();
  closeModal();
});

document.getElementById("downloadCSVBtn").addEventListener("click", () => {
  if (languageApps.length === 0) {
    alert("Database is empty");
    return;
  }

  const headers = ["app", "languages", "ref", "notes"];
  const rows = [headers.join(",")];

  languageApps.forEach(item => {
    const row = headers.map(h => {
      const value = String(item[h] ?? "");
      return '"' + value.replace(/"/g, '""') + '"';
    });
    rows.push(row.join(","));
  });

  const blob = new Blob([rows.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "language_apps.csv";
  a.click();
});

document.getElementById("downloadJSONBtn").addEventListener("click", () => {
  if (languageApps.length === 0) {
    alert("Database is empty");
    return;
  }

  const blob = new Blob([JSON.stringify(languageApps, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "language_apps.json";
  a.click();
});

</script>

</body>
</html>
