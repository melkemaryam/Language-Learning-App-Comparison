<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Language Revitalisation Apps</title>
  <style>
    body{font-family:Georgia,serif;background:#f7f7f5;max-width:1400px;margin:auto;padding:25px}
    .panel{background:white;border:1px solid #ddd;border-radius:10px;padding:20px;margin-bottom:20px}
    table{width:100%;border-collapse:collapse}
    th,td{border:1px solid #ddd;padding:8px;vertical-align:top}
    th{background:#f0f0f0}
    button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer}
    .primary{background:#1f4e79;color:white}
    .secondary{background:#e9ecef}
    .score-btn{margin:2px;padding:4px 10px}
    .active{background:#1f4e79;color:white}
    input,textarea,select{width:100%;padding:6px;box-sizing:border-box}
    .topnav{
      background:#1f4e79;
      padding:12px 18px;
      margin-bottom:20px;
      border-radius:10px;
    }
    .topnav a{
      color:white;
      text-decoration:none;
      margin-right:18px;
      font-weight:bold;
    }
    .topnav a:hover{text-decoration:underline}

    #dbTable td {
      max-width: 250px;
      word-wrap: break-word;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<nav class="topnav">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="archive.html">Archive</a>
  <a href="contact.html">Contact</a>
  <a href="analysis.html">Analysis</a>
</nav>

<h1>Systematic Review of Language Revitalisation Apps</h1>

<div class="panel">
  <h2>Paper Metadata</h2>
  <p>Title<br><input id="title"></p>
  <p>Year<br><input id="year"></p>
  <p>URL<br><input id="doi"></p>
  <p>Apps<br><input id="app"></p>
  <p>Languages<br><input id="lang"></p>
  <p>Type<br>
    <select id="type">
      <option value="Commercial">Commercial</option>
      <option value="Research: Review">Research: Review</option>
      <option value="Research: Focused Use Case">Research: Focused Use Case</option>
    </select>
  </p>
</div>

<div class="panel">
  <h2>Coding Scores</h2>
  <table>
    <thead>
      <tr>
        <th>Criterion</th>
        <th>Score</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="codingBody"></tbody>
  </table>

  <p><strong>Composite Score:</strong> <span id="score">0</span></p>

  <button class="primary" onclick="savePaper()">Save Paper</button>
  <button class="secondary" onclick="resetScores()">Reset Scores</button>
  <button class="secondary" onclick="downloadCSV()">Download CSV</button>
  <button class="secondary" onclick="downloadJSON()">Download JSON</button>
</div>

<div class="panel">
  <h2>Paper Database</h2>
  <table id="dbTable">
  <thead>
    <tr>
      <th>Title</th>
      <th>Year</th>
      <th>URL</th>
      <th>Apps</th>
      <th>Languages</th>
      <th>Type</th>
      <th>Score</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
</div>

<div class="panel">
  <h2>Leaderboard</h2>
  <table id="leaderboard">
    <thead>
      <tr><th>Rank</th><th>Paper</th><th>Score</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBun5d_4VVkcGS69jDqIm28k4Ah4aJ7Ja0",
  authDomain: "language-learning-app-archive.firebaseapp.com",
  databaseURL: "https://language-learning-app-archive-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "language-learning-app-archive",
  storageBucket: "language-learning-app-archive.firebasestorage.app",
  messagingSenderId: "934444112237",
  appId: "1:934444112237:web:d09b8f2bc071a2d38ca264",
  measurementId: "G-1P7G4Z4X2D"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const criteria = [
  "Language Coverage",
  "Pedagogical Depth",
  "Technical Capability",
  "Community & Sustainability",
  "Equity & Access"
];

const notePlaceholders = [
  "Which languages are covered? How do they deal with data limitations?",
  "Describe pedagogy, curriculum, educational guidelines, etc.",
  "Special features, AI usage, evaluation, data collection...",
  "Community size, interaction with native speakers, long-term sustainability...",
  "Accessibility, affordability, inclusivity, device requirements..."
];

const scores = {};
let paperDatabase = [];
let editingPaperKey = null;

function buildTable() {
  const body = document.getElementById("codingBody");
  body.innerHTML = "";
  criteria.forEach((c, i) => {
    scores[i] = 0;
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${c}</td>
      <td id="btns-${i}"></td>
      <td>
        <textarea
          id="note-${i}"
          rows="2"
          placeholder="${notePlaceholders[i]}"
        ></textarea>
      </td>
    `;
    body.appendChild(row);



    const btnContainer = document.getElementById(`btns-${i}`);
    for (let s = 0; s <= 3; s++) {
      const b = document.createElement("button");
      b.className = "score-btn" + (s === 0 ? " active" : "");
      b.innerText = s;
      b.onclick = () => setScore(i, s, b);
      btnContainer.appendChild(b);
    }
  });
}

function setScore(idx, val, btn) {
  scores[idx] = val;
  document.querySelectorAll(`#btns-${idx} button`).forEach(x => x.classList.remove("active"));
  btn.classList.add("active");
  calculateScore();
}

function calculateScore() {
  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  const average = total / criteria.length;
  document.getElementById("score").innerText = average;
  return average;
}

function loadPapersFromFirebase() {
  db.ref("papers").on("value", snapshot => {
    paperDatabase = [];
    snapshot.forEach(child => {
      paperDatabase.push({ _key: child.key, ...child.val() });
    });
    renderTables();
  });
}

function savePaperToFirebase(paper) {
  return db.ref("papers").push(paper);
}


async function savePaper() {

  const paper = {
    title: document.getElementById("title").value.trim(),
    year: document.getElementById("year").value.trim(),
    doi: document.getElementById("doi").value.trim(),
    app: document.getElementById("app").value.trim(),
    lang: document.getElementById("lang").value.trim(),
    type: document.getElementById("type").value,
    totalScore: calculateScore()
  };

  criteria.forEach((c, i) => {
    paper[c + "_score"] = scores[i];
    paper[c + "_notes"] =
      document.getElementById(`note-${i}`).value.trim();
  });

  try {

    if (editingPaperKey) {
      await db.ref(`papers/${editingPaperKey}`).set(paper);
      alert("Paper updated.");
    } else {
      await db.ref("papers").push(paper);
      alert("Paper saved.");
    }

    // Reset the form after a successful save/update
    resetScores();


  } catch(err) {
    console.error(err);
    alert("Error saving paper.");
  }
}

function editPaper(index) {

  const p = paperDatabase[index];

  editingPaperKey = p._key;

  document.getElementById("title").value = p.title || "";
  document.getElementById("year").value = p.year || "";
  document.getElementById("doi").value = p.doi || "";
  document.getElementById("app").value = p.app || "";
  document.getElementById("lang").value = p.lang || "";
  document.getElementById("type").value =
    p.type || "Commercial";

  criteria.forEach((c, i) => {

    scores[i] = p[c + "_score"] || 0;

    document.getElementById(`note-${i}`).value =
      p[c + "_notes"] || "";

    const buttons =
      document.querySelectorAll(`#btns-${i} button`);

    buttons.forEach(btn =>
      btn.classList.remove("active")
    );

    buttons[scores[i]].classList.add("active");
  });

  calculateScore();

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

function deletePaper(index) {

  const p = paperDatabase[index];

  if (!confirm(`Delete "${p.title}"?`)) return;

  db.ref(`papers/${p._key}`).remove();
}

function renderTables() {

  const tbody =
    document.querySelector("#dbTable tbody");

  tbody.innerHTML = "";

  paperDatabase.forEach((p, index) => {

    tbody.innerHTML += `
      <tr>
        <td>${p.title || ""}</td>

        <td>${p.year || ""}</td>

        <td><a href="${p.doi || "#"}" target="_blank" rel="noopener noreferrer">${"Where to find it"}</a></td>

        <td>${p.app || ""}</td>

        <td>${p.lang || ""}</td>

        <td>${p.type || ""}</td>

        <td>${Number(p.totalScore || 0).toFixed(2)}</td>

        <td>
          <button class="secondary"
                  onclick="editPaper(${index})">
            Edit
          </button>

          <button class="secondary"
                  onclick="deletePaper(${index})">
            Delete
          </button>
        </td>
      </tr>
    `;
  });

  const lb =
    document.querySelector("#leaderboard tbody");

  lb.innerHTML = "";

  [...paperDatabase]
    .sort((a,b)=>
      (b.totalScore||0) - (a.totalScore||0)
    )
    .forEach((p,i)=>{

      lb.innerHTML += `
        <tr>
          <td>${i+1}</td>
          <td>${p.title || ""}</td>
          <td>${p.totalScore ?? ""}</td>
        </tr>
      `;
    });
}

function resetScores() {

  // Exit edit mode
  editingPaperKey = null;

  // Reset metadata fields
  document.getElementById("title").value = "";
  document.getElementById("year").value = "";
  document.getElementById("doi").value = "";
  document.getElementById("app").value = "";
  document.getElementById("lang").value = "";
  document.getElementById("type").value = "Commercial";

  // Reset scores
  Object.keys(scores).forEach(k => {
    scores[k] = 0;
  });

  // Reset notes and buttons
  criteria.forEach((c, i) => {

    document.getElementById(`note-${i}`).value = "";

    const buttons = document.querySelectorAll(`#btns-${i} button`);

    buttons.forEach(btn => btn.classList.remove("active"));

    buttons[0].classList.add("active");
  });

  calculateScore();

}

function downloadCSV() {

  if (!paperDatabase.length) {
    alert("No papers available");
    return;
  }

  const headers = Object.keys(paperDatabase[0]);

  const rows = [
    headers.join(",")
  ];

  paperDatabase.forEach(row => {

    rows.push(
      headers.map(h =>
        `"${String(row[h] ?? "")
          .replace(/"/g,'""')}"`
      ).join(",")
    );
  });

  const blob = new Blob(
    [rows.join("\n")],
    {type:"text/csv"}
  );

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "paper_database.csv";
  a.click();
}

function downloadJSON() {

  const blob = new Blob(
    [JSON.stringify(
      paperDatabase,
      null,
      2
    )],
    {type:"application/json"}
  );

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "paper_database.json";
  a.click();
}


buildTable();
calculateScore();
loadPapersFromFirebase();
</script>

</body>
</html>
